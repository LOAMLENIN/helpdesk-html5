<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Reportar Incidente</title>
    <link rel="stylesheet" href="reportar.css">
</head>
<body>

    <header>
        <h1>Sistema Help Desk</h1>
    </header>

    <nav>
        <ul>
            <li><a href="index.html">Inicio</a></li>
            <li><a href="reportar.html">Reportar Incidente</a></li>
            <li><a href="tickets.html">Tickets</a></li>
        </ul>
    </nav>

    <main>
        <section>
            <h2>Formulario de Reporte</h2>

            <form>

                <article>
                    <label for="titulo">Título del Incidente:</label><br>
                    <input type="text" id="titulo" name="titulo" required>
                </article>

                <br>

                <article>
                    <label for="categoria">Categoría:</label><br>
                    <select id="categoria" name="categoria" required>
                        <option value="">Seleccione</option>
                        <option value="red">Red</option>
                        <option value="hardware">Hardware</option>
                        <option value="software">Software</option>
                    </select>
                </article>

                <br>

                <article>
                    <p>Prioridad:</p>

                    <input type="radio" id="alta" name="prioridad" value="Alta">
                    <label for="alta">Alta</label>

                    <input type="radio" id="media" name="prioridad" value="Media">
                    <label for="media">Media</label>

                    <input type="radio" id="baja" name="prioridad" value="Baja">
                    <label for="baja">Baja</label>
                </article>

                <br>

                <article>
                    <label for="descripcion">Descripción:</label><br>
                    <textarea id="descripcion" name="descripcion"
                    rows="6" cols="50" required></textarea>
                </article>

                <br>

                <button type="submit">Enviar Reporte</button>
                <button type="reset">Limpiar</button>

            </form>
        </section>
    </main>

    <footer>
        <p>&copy; 2026 Sistema Help Desk</p>
    </footer>

</body>
</html>
